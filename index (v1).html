<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#faf7f4">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>노아토익 자동사</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#faf7f4;--card:#fff;--text:#2d2a26;--muted:#8a8580;--light:#b5b0ab;--rose:#e8a0b4;--blush:#f5c6d0;--lavender:#c3b1e1;--sage:#b8d4c8;--peach:#f5cba7;--sky:#a7c7e7;--warm:#f9f1ea;--coral:#f0a290;--lilac:#d4b8e0;--mint:#a8d8c8;--shadow:0 2px 16px rgba(45,42,38,.06);--shadow-lg:0 8px 32px rgba(45,42,38,.1);--radius:16px;--radius-sm:12px;--safe-bottom:env(safe-area-inset-bottom,0px)}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR','DM Sans',sans-serif;font-weight:400}
#app{height:100%;display:flex;flex-direction:column;overflow:hidden}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 20px 100px;display:none;-webkit-overflow-scrolling:touch}
.screen.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.header{padding:14px 20px 10px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;background:rgba(250,247,244,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.header-title{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700}
.header-title em{color:var(--rose);font-style:italic}
.header-sub{font-size:.65rem;color:var(--muted);letter-spacing:.08em;font-weight:500}
.tab-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;justify-content:space-around;align-items:center;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(45,42,38,.06);padding:6px 0 calc(6px + var(--safe-bottom))}
.tab{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 14px;cursor:pointer;transition:all .2s;border-radius:12px;-webkit-user-select:none;user-select:none}
.tab svg{width:20px;height:20px;stroke:var(--muted);fill:none;stroke-width:1.8;transition:all .2s}
.tab span{font-size:.6rem;color:var(--muted);font-weight:500;transition:all .2s}
.tab.active svg{stroke:var(--rose)}.tab.active span{color:var(--rose);font-weight:700}
.tab:active{transform:scale(.92)}
.hero{margin:6px 0 20px;padding:28px 22px;border-radius:20px;text-align:center;background:linear-gradient(145deg,#fdf0ea,#f3e8f4,#e8eff8);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(232,160,180,.15)}
.hero::after{content:'';position:absolute;bottom:-20px;left:-20px;width:90px;height:90px;border-radius:50%;background:rgba(195,177,225,.12)}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(1.5rem,5vw,2rem);font-weight:700;line-height:1.3;position:relative;z-index:1}
.hero h1 em{color:var(--rose);font-style:italic}
.hero p{color:var(--muted);font-size:.82rem;margin-top:6px;position:relative;z-index:1}
.section-label{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;font-weight:600;color:var(--muted);margin:20px 0 10px;padding-left:2px}
.progress-overview{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px}
.stat-card{background:var(--card);border:1px solid rgba(45,42,38,.05);border-radius:var(--radius-sm);padding:14px 10px;text-align:center}
.stat-card .num{font-family:'DM Sans',sans-serif;font-size:1.5rem;font-weight:700}
.stat-card .label{font-size:.65rem;color:var(--muted);margin-top:2px}
.cat-list{display:flex;flex-direction:column;gap:8px}
.cat-item{background:var(--card);border:1px solid rgba(45,42,38,.05);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .25s}
.cat-item:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.cat-item:active{transform:scale(.98)}
.cat-item.featured{background:linear-gradient(135deg,rgba(232,160,180,.08),rgba(195,177,225,.08));border:1.5px solid rgba(232,160,180,.15)}
.cat-dot{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;font-weight:700;font-family:'DM Sans',sans-serif}
.cat-info{flex:1}.cat-info .name{font-weight:700;font-size:.88rem}.cat-info .count{font-size:.7rem;color:var(--muted);margin-top:1px}
.cat-arrow{color:var(--light);font-size:.75rem}
.cat-progress-bar{width:100%;height:3px;background:rgba(45,42,38,.06);border-radius:2px;margin-top:6px;overflow:hidden}
.cat-progress-fill{height:100%;border-radius:2px;transition:width .5s ease}
.study-header{display:flex;align-items:center;gap:12px;padding:14px 0 10px}
.back-btn{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--card);border:1px solid rgba(45,42,38,.06);cursor:pointer;font-size:.95rem;transition:all .2s}
.back-btn:hover{background:var(--rose);color:#fff;border-color:var(--rose)}
.study-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700}
.study-count{font-size:.7rem;color:var(--muted)}
.flashcard-container{position:relative;height:340px;margin:10px 0;perspective:1000px}
.flashcard{position:absolute;width:100%;height:100%;border-radius:20px;cursor:pointer;transition:transform .6s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d}
.flashcard.flipped{transform:rotateY(180deg)}
.flash-front,.flash-back{position:absolute;width:100%;height:100%;border-radius:20px;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px;background:var(--card);border:1px solid rgba(45,42,38,.05);box-shadow:var(--shadow)}
.flash-back{transform:rotateY(180deg);background:linear-gradient(145deg,#fdf0ea,#f3e8f4)}
.flash-word{font-family:'DM Sans',sans-serif;font-size:clamp(1.8rem,5vw,2.4rem);font-weight:700;letter-spacing:-.02em;text-align:center}
.flash-prep{font-size:.95rem;color:var(--rose);margin-top:6px;font-weight:600;font-family:'DM Sans',sans-serif}
.flash-meaning{font-size:1.15rem;font-weight:700;margin-bottom:8px;text-align:center}
.flash-ex-box{margin-top:12px;padding:12px 14px;background:rgba(45,42,38,.03);border-radius:10px;width:100%;text-align:center}
.flash-ex-en{font-size:.82rem;color:var(--text);line-height:1.6;font-family:'DM Sans',sans-serif}
.flash-ex-en b{color:var(--rose);font-weight:700}
.flash-ex-kr{font-size:.76rem;color:var(--muted);margin-top:6px;line-height:1.5}
.flash-hint{font-size:.68rem;color:var(--light);margin-top:auto;padding-top:8px}
.flash-nav{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:14px}
.flash-nav-btn{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--card);border:1.5px solid rgba(45,42,38,.08);cursor:pointer;font-size:1rem;transition:all .25s}
.flash-nav-btn:hover{background:var(--rose);color:#fff;border-color:var(--rose)}
.flash-nav-btn:active{transform:scale(.9)}
.flash-nav-btn:disabled{opacity:.25;cursor:not-allowed}
.flash-counter{font-family:'DM Sans',sans-serif;font-size:.8rem;color:var(--muted);font-weight:600;min-width:55px;text-align:center}
.flash-dots{display:flex;gap:3px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.flash-dot{width:5px;height:5px;border-radius:50%;background:rgba(45,42,38,.1);transition:all .3s}
.flash-dot.active{background:var(--rose);width:16px;border-radius:3px}
.bookmark-btn{position:absolute;top:14px;right:14px;z-index:5;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.8);border:none;cursor:pointer;font-size:.95rem;transition:all .2s}
.bookmark-btn:hover{transform:scale(1.1)}.bookmark-btn.saved{color:var(--rose)}
.quiz-progress{display:flex;gap:2px;margin:6px 0 16px}
.quiz-pip{flex:1;height:3px;border-radius:2px;background:rgba(45,42,38,.08);transition:background .3s}
.quiz-pip.done{background:var(--sage)}.quiz-pip.current{background:var(--rose)}.quiz-pip.wrong-pip{background:#d47a8a}
.quiz-card{background:var(--card);border:1px solid rgba(45,42,38,.05);border-radius:20px;padding:24px 20px;box-shadow:var(--shadow);animation:fadeIn .3s ease}
.quiz-label{font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;font-weight:600;color:var(--lavender);margin-bottom:12px}
.quiz-sentence{font-family:'DM Sans',sans-serif;font-size:clamp(1rem,2.8vw,1.25rem);line-height:1.7;font-weight:500;margin-bottom:20px}
.quiz-options{display:flex;flex-direction:column;gap:8px}
.quiz-opt{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--warm);border:1.5px solid transparent;border-radius:var(--radius-sm);cursor:pointer;transition:all .25s;font-family:'DM Sans',sans-serif;font-weight:500;font-size:.9rem}
.quiz-opt:hover{border-color:var(--rose);background:rgba(232,160,180,.06)}
.quiz-opt:active{transform:scale(.98)}
.opt-circle{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;background:var(--card);border:1.5px solid rgba(45,42,38,.1);flex-shrink:0;transition:all .25s}
.quiz-opt:hover .opt-circle{border-color:var(--rose);color:var(--rose)}
.quiz-opt.correct{border-color:#6aab73;background:rgba(106,171,115,.08)}
.quiz-opt.correct .opt-circle{background:#6aab73;color:#fff;border-color:#6aab73}
.quiz-opt.wrong{border-color:#d47a8a;background:rgba(212,122,138,.06);animation:gentleShake .4s ease}
.quiz-opt.wrong .opt-circle{background:#d47a8a;color:#fff;border-color:#d47a8a}
@keyframes gentleShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.quiz-feedback{margin-top:14px;padding:12px 14px;border-radius:var(--radius-sm);font-size:.82rem;line-height:1.6;animation:fadeIn .3s ease}
.quiz-feedback.correct-fb{background:rgba(106,171,115,.08);color:#5a9463}
.quiz-feedback.wrong-fb{background:rgba(212,122,138,.06);color:#b8687a}
.quiz-next{display:block;width:100%;margin-top:14px;padding:13px;border:none;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--rose),var(--lavender));color:#fff;font-size:.88rem;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.quiz-next:active{transform:scale(.98)}
.quiz-result-screen{text-align:center;padding:36px 20px}
.result-circle{width:130px;height:130px;border-radius:50%;margin:0 auto 20px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(145deg,#fdf0ea,#f3e8f4);border:3px solid var(--rose)}
.result-circle .score{font-family:'DM Sans',sans-serif;font-size:2.2rem;font-weight:700;color:var(--rose)}
.result-circle .of{font-size:.7rem;color:var(--muted)}
.result-msg{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;margin-bottom:6px}
.result-sub{font-size:.85rem;color:var(--muted);line-height:1.6}
.result-btn{display:inline-flex;align-items:center;gap:6px;margin-top:20px;padding:11px 24px;border-radius:50px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--rose),var(--lavender));color:#fff;font-size:.85rem;font-weight:600;font-family:'Noto Sans KR',sans-serif}
.result-btn:active{transform:scale(.96)}
.result-btn.secondary{background:var(--card);color:var(--text);border:1.5px solid rgba(45,42,38,.1);box-shadow:none}
.empty-state{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-state .empty-icon{font-size:2.5rem;margin-bottom:10px;opacity:.4}
.empty-state p{font-size:.85rem;line-height:1.6}
.bookmark-list{display:flex;flex-direction:column;gap:6px}
.bm-item{background:var(--card);border:1px solid rgba(45,42,38,.05);border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:center;justify-content:space-between}
.bm-word{font-family:'DM Sans',sans-serif;font-weight:700;font-size:.92rem}
.bm-meaning{font-size:.72rem;color:var(--muted);margin-top:1px}
.bm-remove{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(212,122,138,.08);color:#d47a8a;border:none;cursor:pointer;font-size:.75rem}
.bm-remove:hover{background:#d47a8a;color:#fff}
.tip-banner{background:linear-gradient(135deg,rgba(195,177,225,.12),rgba(232,160,180,.1));border:1px solid rgba(195,177,225,.15);border-radius:var(--radius);padding:16px;margin:12px 0}
.tip-banner .tip-tag{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;font-weight:600;color:var(--lavender);margin-bottom:6px}
.tip-banner p{font-size:.82rem;line-height:1.7;color:var(--muted)}
.tip-banner .hl{color:var(--rose);font-weight:700}
.petal{position:fixed;top:-20px;z-index:200;pointer-events:none;border-radius:50% 0 50% 50%;animation:petalFall var(--dur) cubic-bezier(.25,.46,.45,.94) forwards}
@keyframes petalFall{0%{transform:translateY(0) rotate(0deg) scale(1);opacity:.8}100%{transform:translateY(105vh) rotate(540deg) scale(.3);opacity:0}}
.quiz-type-sel{display:flex;flex-direction:column;gap:10px;margin-top:10px}
.quiz-type-btn{background:var(--card);border:1px solid rgba(45,42,38,.05);border-radius:var(--radius);padding:18px;cursor:pointer;transition:all .25s;text-align:center}
.quiz-type-btn:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.quiz-type-btn:active{transform:scale(.98)}
.quiz-type-btn .qt-title{font-weight:700;font-size:.95rem;margin-bottom:4px}
.quiz-type-btn .qt-desc{font-size:.75rem;color:var(--muted)}
</style>
</head>
<body>
<div id="app">
  <div class="header"><div><div class="header-title">노아토익 <em>자동사</em></div><div class="header-sub">INTRANSITIVE VERBS MASTER</div></div></div>
  <div class="screen active" id="screen-home">
    <div class="hero"><h1>노아토익 <em>자동사</em><br>완전 정복</h1><p>전치사별 자동사 · 짝꿍없는 자동사 · 자동사/타동사 비교</p></div>
    <div class="section-label">학습 현황</div>
    <div class="progress-overview">
      <div class="stat-card"><div class="num" id="stat-total">0</div><div class="label">전체 단어</div></div>
      <div class="stat-card"><div class="num" id="stat-bookmarked">0</div><div class="label">저장</div></div>
    </div>
    <div class="tip-banner"><div class="tip-tag">💡 핵심 포인트</div><p>자동사는 <span class="hl">목적어 없이</span> 전치사와 함께 써요!<br>빈칸 뒤에 <span class="hl">전치사</span>가 보이면 → 자동사 선택<br>빈칸 뒤에 <span class="hl">명사</span>가 바로 오면 → 타동사 선택</p></div>
    <div class="section-label">자동사 + 전치사</div>
    <div class="cat-list" id="cat-list"></div>
    <div class="section-label" style="margin-top:24px">특별 카테고리</div>
    <div class="cat-list" id="special-list"></div>
  </div>
  <div class="screen" id="screen-study">
    <div class="study-header"><div class="back-btn" onclick="goHome()">←</div><div><div class="study-title" id="study-cat-name"></div><div class="study-count" id="study-cat-count"></div></div></div>
    <div id="study-content"></div>
  </div>
  <div class="screen" id="screen-quiz">
    <div class="study-header"><div class="back-btn" onclick="goHome()">←</div><div><div class="study-title">퀴즈</div><div class="study-count">실력 테스트</div></div></div>
    <div id="quiz-area"></div>
  </div>
  <div class="screen" id="screen-bookmarks">
    <div style="padding:14px 0 6px"><span class="section-label" style="margin:0">저장한 단어</span></div>
    <div id="bookmark-content"></div>
  </div>
  <div class="tab-bar">
    <div class="tab active" data-tab="home" onclick="switchTab('home')"><svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg><span>홈</span></div>
    <div class="tab" data-tab="quiz" onclick="switchTab('quiz');showQuizMenu()"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9.5 9.5a2.5 2.5 0 015 0c0 1.5-2.5 2-2.5 3.5M12 17h.01"/></svg><span>퀴즈</span></div>
    <div class="tab" data-tab="bookmarks" onclick="switchTab('bookmarks');renderBookmarks()"><svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg><span>저장</span></div>
  </div>
</div>
<script>
// ===== DATA — TOEIC-style examples with Korean translations =====
const prepCats = [
  {id:'at',name:'자동사 + at',color:'#e8a0b4',bg:'rgba(232,160,180,.1)',verbs:[
    {v:'aim',p:'aim at',m:'~을 목표로 하다',ex:'The marketing team is <b>aiming at</b> increasing brand awareness by 30%.',kr:'마케팅 팀은 브랜드 인지도를 30% 높이는 것을 목표로 하고 있다.'},
    {v:'look',p:'look at',m:'~을 보다',ex:'Please <b>look at</b> the revised budget proposal before the meeting.',kr:'회의 전에 수정된 예산안을 살펴봐 주세요.'},
    {v:'arrive',p:'arrive at',m:'~에 도착하다',ex:'All participants must <b>arrive at</b> the venue no later than 9 A.M.',kr:'모든 참가자는 오전 9시까지 행사장에 도착해야 합니다.'}
  ]},
  {id:'for',name:'자동사 + for',color:'#c3b1e1',bg:'rgba(195,177,225,.1)',verbs:[
    {v:'account',p:'account for',m:'~을 차지하다, 설명하다',ex:'Overseas sales <b>account for</b> nearly 60% of the company\'s total revenue.',kr:'해외 매출이 회사 전체 수익의 거의 60%를 차지한다.'},
    {v:'register',p:'register for',m:'~에 등록하다',ex:'Employees who wish to attend must <b>register for</b> the workshop by Friday.',kr:'참석을 원하는 직원은 금요일까지 워크숍에 등록해야 합니다.'},
    {v:'apologize',p:'apologize for',m:'~에 대해 사과하다',ex:'We sincerely <b>apologize for</b> the delay in processing your order.',kr:'주문 처리가 지연된 점 진심으로 사과드립니다.'},
    {v:'shop',p:'shop for',m:'~을 사다',ex:'Many consumers prefer to <b>shop for</b> office supplies online.',kr:'많은 소비자들이 사무용품을 온라인으로 구매하는 것을 선호한다.'},
    {v:'apply',p:'apply for',m:'~에 지원하다',ex:'Qualified candidates are encouraged to <b>apply for</b> the managerial position.',kr:'자격을 갖춘 지원자들은 관리직에 지원하시기 바랍니다.'},
    {v:'sign up',p:'sign up for',m:'~을 신청하다',ex:'New members can <b>sign up for</b> a complimentary trial period.',kr:'신규 회원은 무료 체험 기간을 신청할 수 있습니다.'},
    {v:'look',p:'look for',m:'~을 찾다',ex:'The HR department is <b>looking for</b> experienced software developers.',kr:'인사부에서 경험 있는 소프트웨어 개발자를 찾고 있습니다.'},
    {v:'wait',p:'wait for',m:'~을 기다리다',ex:'Customers have been <b>waiting for</b> the release of the updated model.',kr:'고객들이 업데이트된 모델의 출시를 기다려 왔습니다.'}

const allPrepVerbs=[];
prepCats.forEach((c,ci)=>{c.verbs.forEach((v,vi)=>{allPrepVerbs.push({...v,catIdx:ci,verbIdx:vi})})});

// Shuffle utility
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

// ===== STATE with localStorage persistence =====
function saveState(){
  try{
    const data={
      bookmarks:[...bookmarks],
      learnedCards:[...learnedCards],
      wrongBank:wrongBank,
      lastCardPos:lastCardPos,
      shuffledAllPrepIndices:shuffledAllPrep.map(v=>allPrepVerbs.indexOf(v))
    };
    try{localStorage.setItem('noah-toeic-state',JSON.stringify(data))}catch(e){}
  }catch(e){}
}
function loadState(){
  try{
    const raw=localStorage.getItem('noah-toeic-state');
    if(!raw)return;
    const data=JSON.parse(raw);
    if(data.bookmarks) bookmarks=new Set(data.bookmarks);
    if(data.learnedCards) learnedCards=new Set(data.learnedCards);
    if(data.wrongBank) wrongBank=data.wrongBank;
    if(data.lastCardPos) lastCardPos=data.lastCardPos;
    if(data.shuffledAllPrepIndices&&data.shuffledAllPrepIndices.length>0){
      shuffledAllPrep=data.shuffledAllPrepIndices.map(i=>allPrepVerbs[i]).filter(Boolean);
    }
  }catch(e){}
}

let bookmarks=new Set();
let learnedCards=new Set();
let currentStudy={type:'',idx:0,card:0};
let quizState={current:0,score:0,answered:[],data:[]};
let shuffledAllPrep=[];
let wrongBank=[];
let lastCardPos={};

function getTotalWords(){let t=0;prepCats.forEach(c=>t+=c.verbs.length);t+=soloVerbs.length;t+=comparePairs.length*2;return t}

function markCurrentCardLearned(){
  let key;
  if(currentStudy.type==='all-prep'){
    const v=shuffledAllPrep[currentStudy.card];
    key=`prep-${v.catIdx}-${v.verbIdx}`;
  } else {
    key=`${currentStudy.type}-${currentStudy.idx}-${currentStudy.card}`;
  }
  learnedCards.add(key);
  if(currentStudy.type==='compare') learnedCards.add(key+'-vt');
  saveState();
}

// ===== NAV =====
function switchTab(tab){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(`screen-${tab}`).classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
}
function goHome(){switchTab('home');renderHome()}

// ===== HOME =====

  document.getElementById('stat-total').textContent=getTotalWords();
  document.getElementById('stat-bookmarked').textContent=bookmarks.size;

  function prepProg(idx){const t=prepCats[idx].verbs.length;const l=[...learnedCards].filter(k=>k.startsWith(`prep-${idx}-`)).length;return Math.round(l/t*100)}
  function allPrepProg(){const t=allPrepVerbs.length;const l=[...learnedCards].filter(k=>k.startsWith('all-prep-0-')).length;return Math.round(l/t*100)}
  function soloProg(){const t=soloVerbs.length;const l=[...learnedCards].filter(k=>k.startsWith('solo-0-')&&!k.endsWith('-vt')).length;return Math.round(l/t*100)}
  function compareProg(){const t=comparePairs.length;const l=[...learnedCards].filter(k=>k.startsWith('compare-0-')&&!k.endsWith('-vt')).length;return Math.round(l/t*100)}

  let catHTML=`<div class="cat-item featured" onclick="goStudyAllPrep()">

    <div class="cat-info"><div class="name">🔗 전체 자동사 + 전치사</div><div class="count">${allPrepVerbs.length}개 표현 · 랜덤 셔플</div>
      <div class="cat-progress-bar"><div class="cat-progress-fill" style="width:${allPrepProg()}%;background:linear-gradient(90deg,var(--rose),var(--lavender))"></div></div>
    </div><div class="cat-arrow">›</div></div>`;
  catHTML+=prepCats.map((c,i)=>`<div class="cat-item" onclick="goStudyPrep(${i})">
    <div class="cat-dot" style="background:${c.bg};color:${c.color}">${c.id}</div>
    <div class="cat-info"><div class="name">${c.name}</div><div class="count">${c.verbs.length}개 표현</div>
      <div class="cat-progress-bar"><div class="cat-progress-fill" style="width:${prepProg(i)}%;background:${c.color}"></div></div>
    </div><div class="cat-arrow">›</div></div>`).join('');
  document.getElementById('cat-list').innerHTML=catHTML;

  document.getElementById('special-list').innerHTML=`
    <div class="cat-item" onclick="goStudySolo()"><div class="cat-dot" style="background:rgba(168,216,200,.12);color:var(--sage)">Vi</div>
      <div class="cat-info"><div class="name">짝꿍없는 자동사</div><div class="count">${soloVerbs.length}개 단어</div>
        <div class="cat-progress-bar"><div class="cat-progress-fill" style="width:${soloProg()}%;background:var(--sage)"></div></div>
      </div><div class="cat-arrow">›</div></div>
    <div class="cat-item" onclick="goStudyCompare()"><div class="cat-dot" style="background:rgba(167,199,231,.12);color:var(--sky)">VS</div>
      <div class="cat-info"><div class="name">자동사 / 타동사 비교</div><div class="count">${comparePairs.length*2}단어</div>
        <div class="cat-progress-bar"><div class="cat-progress-fill" style="width:${compareProg()}%;background:var(--sky)"></div></div>
      </div><div class="cat-arrow">›</div></div>`;

// ===== STUDY =====

function goStudyAllPrep(){
  if(!shuffledAllPrep.length) shuffledAllPrep=shuffle(allPrepVerbs);
  const saved=lastCardPos['all-prep']||0;
  currentStudy={type:'all-prep',idx:0,card:saved};
  document.getElementById('study-cat-name').textContent='전체 자동사 + 전치사';
  document.getElementById('study-cat-count').textContent=allPrepVerbs.length+'개 표현 · 랜덤';
  renderStudyCard();switchTab('study');
}
function goStudyPrep(idx){
  const saved=lastCardPos['prep-'+idx]||0;
  currentStudy={type:'prep',idx,card:saved};
  document.getElementById('study-cat-name').textContent=prepCats[idx].name;
  document.getElementById('study-cat-count').textContent=prepCats[idx].verbs.length+'개 표현';
  renderStudyCard();switchTab('study');
}
function goStudySolo(){
  const saved=lastCardPos['solo']||0;
  currentStudy={type:'solo',idx:0,card:saved};
  document.getElementById('study-cat-name').textContent='짝꿍없는 자동사';
  document.getElementById('study-cat-count').textContent=soloVerbs.length+'개 단어';
  renderStudyCard();switchTab('study');
}
function goStudyCompare(){
  const saved=lastCardPos['compare']||0;
  currentStudy={type:'compare',idx:0,card:saved};
  document.getElementById('study-cat-name').textContent='자동사 / 타동사 비교';
  document.getElementById('study-cat-count').textContent=comparePairs.length*2+'단어';
  renderStudyCard();switchTab('study');
}

function getStudyItems(){
  const s=currentStudy;
  if(s.type==='all-prep')return shuffledAllPrep;
  if(s.type==='prep')return prepCats[s.idx].verbs;
  if(s.type==='solo')return soloVerbs;
  if(s.type==='compare')return comparePairs;
  return[];
}

function renderStudyCard(){
  const items=getStudyItems();
  const i=currentStudy.card;
  const total=items.length;
  // For all-prep, use the original prep index so bookmarks are stable regardless of shuffle
  let bkey;
  if(currentStudy.type==='all-prep'){
    const v=items[i];
    bkey=`prep-${v.catIdx}-${v.verbIdx}`;
  } else {
    bkey=`${currentStudy.type}-${currentStudy.idx}-${i}`;
  }
  const isSaved=bookmarks.has(bkey);
  const bmBtn=`<button class="bookmark-btn ${isSaved?'saved':''}" onclick="event.stopPropagation();toggleBM('${bkey}')">${isSaved?'♥':'♡'}</button>`;
  let cardHTML='';

  if(currentStudy.type==='prep'||currentStudy.type==='all-prep'){
    const v=items[i];
    cardHTML=`<div class="flashcard-container">
      <div class="flashcard" id="flashcard" onclick="flipCard()">
        <div class="flash-front">${bmBtn}
          <div style="font-size:.65rem;color:var(--lavender);font-weight:600;letter-spacing:.1em;margin-bottom:10px">INTRANSITIVE VERB</div>
          <div class="flash-word">${v.v}</div>
          <div class="flash-hint">탭하면 전치사 세트와 예문을 볼 수 있어요</div>
        </div>
        <div class="flash-back">${bmBtn}
          <div class="flash-word" style="font-size:1.8rem;color:var(--rose)">${v.p}</div>
          <div class="flash-meaning" style="margin-top:8px">${v.m}</div>
          <div class="flash-ex-box"><div class="flash-ex-en">${v.ex}</div><div class="flash-ex-kr">${v.kr}</div></div>
        </div>
      </div></div>`;
  } else if(currentStudy.type==='solo'){
    const v=items[i];
    cardHTML=`<div class="flashcard-container">
      <div class="flashcard" id="flashcard" onclick="flipCard()">
        <div class="flash-front">${bmBtn}
          <div style="font-size:.65rem;color:var(--sage);font-weight:600;letter-spacing:.1em;margin-bottom:10px">짝꿍없는 자동사</div>
          <div class="flash-word">${v.w}</div>
          <div class="flash-hint">탭하면 뜻과 예문을 볼 수 있어요</div>
        </div>
        <div class="flash-back">${bmBtn}
          <div class="flash-word" style="font-size:1.8rem">${v.w}</div>
          <div class="flash-meaning" style="margin-top:8px">${v.m}</div>
          <div class="flash-ex-box"><div class="flash-ex-en">${v.ex}</div><div class="flash-ex-kr">${v.kr}</div></div>
        </div>
      </div></div>`;
  } else {
    const p=items[i];
    cardHTML=`<div class="flashcard-container">
      <div class="flashcard" id="flashcard" onclick="flipCard()">
        <div class="flash-front">${bmBtn}
          <div style="font-size:.65rem;color:var(--rose);font-weight:600;letter-spacing:.1em;margin-bottom:8px">자동사 vs 타동사</div>
          <div class="flash-word" style="font-size:1.6rem">${p.vi}</div>
          <div class="flash-prep">${p.vim}</div>
          <div class="flash-hint">탭하면 타동사 짝을 볼 수 있어요</div>
        </div>
        <div class="flash-back">${bmBtn}
          <div style="display:flex;gap:20px;align-items:center;justify-content:center;width:100%">
            <div style="text-align:center"><div style="font-size:.6rem;color:var(--rose);font-weight:600;letter-spacing:.1em;margin-bottom:4px">자동사</div>
              <div style="font-family:'DM Sans',sans-serif;font-weight:700;font-size:1.15rem">${p.vi}</div>
              <div style="font-size:.82rem;color:var(--muted);margin-top:2px">${p.vim}</div></div>
            <div style="font-size:1.3rem;color:var(--light)">↔</div>
            <div style="text-align:center"><div style="font-size:.6rem;color:var(--sky);font-weight:600;letter-spacing:.1em;margin-bottom:4px">타동사</div>
              <div style="font-family:'DM Sans',sans-serif;font-weight:700;font-size:1.15rem">${p.vt}</div>
              <div style="font-size:.82rem;color:var(--muted);margin-top:2px">${p.vtm}</div></div>

        </div>
      </div></div>`;
  }

  const dots=Array.from({length:total},(_,j)=>`<div class="flash-dot ${j===i?'active':''}"></div>`).join('');
  document.getElementById('study-content').innerHTML=`${cardHTML}

function flipCard(){
  const el=document.getElementById('flashcard');
  if(!el)return;
  el.classList.toggle('flipped');
  if(el.classList.contains('flipped')) markCurrentCardLearned();
}
function saveCardPos(){
  const s=currentStudy;
  const key=s.type==='prep'?'prep-'+s.idx:s.type;
  lastCardPos[key]=s.card;
  saveState();
}
function studyNext(){const items=getStudyItems();if(currentStudy.card<items.length-1){currentStudy.card++;saveCardPos();renderStudyCard()}}
function studyPrev(){if(currentStudy.card>0){currentStudy.card--;saveCardPos();renderStudyCard()}}

let stx=0;
document.addEventListener('touchstart',e=>{if(document.getElementById('screen-study').classList.contains('active'))stx=e.touches[0].clientX});
document.addEventListener('touchend',e=>{if(!document.getElementById('screen-study').classList.contains('active'))return;const d=e.changedTouches[0].clientX-stx;if(Math.abs(d)>60){d<0?studyNext():studyPrev()}});

  let html='<div class="bookmark-list">';
  bookmarks.forEach(key=>{
    const parts=key.split('-');let word='',meaning='';
    if(parts[0]==='prep'){const ci=parseInt(parts[1]),vi=parseInt(parts[2]);const v=prepCats[ci]?.verbs[vi];if(v){word=v.p;meaning=v.m}}
    else if(parts[0]==='solo'){const vi=parseInt(parts[2]);const v=soloVerbs[vi];if(v){word=v.w;meaning=v.m}}
    else if(parts[0]==='compare'&&!key.endsWith('-vt')){const vi=parseInt(parts[2]);const p=comparePairs[vi];if(p){word=p.vi+' ↔ '+p.vt;meaning=p.vim}}
    if(word)html+=`<div class="bm-item"><div><div class="bm-word">${word}</div><div class="bm-meaning">${meaning}</div></div><button class="bm-remove" onclick="bookmarks.delete('${key}');saveState();renderBookmarks();document.getElementById('stat-bookmarked').textContent=bookmarks.size">✕</button></div>`;
  });
  html+='</div>';el.innerHTML=html;
}

// ===== QUIZ =====
function showQuizMenu(){
  document.getElementById('quiz-area').innerHTML=`
    <div class="tip-banner" style="margin-top:4px"><div class="tip-tag">퀴즈 유형 선택</div><p>원하는 퀴즈를 골라보세요!</p></div>
    <div class="quiz-type-sel">
      <div class="quiz-type-btn" onclick="startPrepQuiz()"><div class="qt-title">🔗 전치사 고르기</div><div class="qt-desc">자동사에 맞는 전치사를 선택하세요</div></div>
      <div class="quiz-type-btn" onclick="startMeanQuiz()"><div class="qt-title">📝 뜻 맞추기</div><div class="qt-desc">자동사 표현의 뜻을 맞춰보세요</div></div>
      <div class="quiz-type-btn" onclick="startVsQuiz()"><div class="qt-title">⚡ 자동사 vs 타동사</div><div class="qt-desc">같은 뜻의 자동사/타동사를 연결하세요</div></div>
      <div class="quiz-type-btn" onclick="startWrongQuiz()" style="border:1.5px solid rgba(212,122,138,.2);background:rgba(212,122,138,.03)"><div class="qt-title">📕 틀린문제 모음집 <span id="wrong-count-badge" style="display:inline-block;background:#d47a8a;color:#fff;font-size:.65rem;padding:1px 8px;border-radius:50px;margin-left:4px;vertical-align:middle">${wrongBank.length}</span></div><div class="qt-desc">${wrongBank.length>0?'틀렸던 문제를 다시 풀어보세요':'아직 틀린 문제가 없어요!'}</div></div>
    </div>`;
}

function startPrepQuiz(){
  const mainPreps=['at','for','from','in','of','on','out','to','with','as','over','about','behind','by','into'];
  const picked=shuffle(allPrepVerbs).slice(0,10);
  quizState.data=picked.map(v=>{
    // Extract actual preposition from the phrase (last word, or specific extraction for etc category)
    const words=v.p.split(' ');
    const actualPrep=words[words.length-1]; // e.g. "aim at" → "at", "emerge as" → "as", "look into" → "into"
    let wrongPreps=mainPreps.filter(p=>p!==actualPrep).sort(()=>Math.random()-.5).slice(0,3);
    let opts=shuffle([actualPrep,...wrongPreps]);
    return{q:`${v.v} _____`,sub:v.m,opts,ans:opts.indexOf(actualPrep),hint:`${v.p} = ${v.m}`};
  });
  quizState.current=0;quizState.score=0;quizState.answered=[];quizState.mode='normal';renderQuiz();
}

function startMeanQuiz(){
  const picked=shuffle(allPrepVerbs).slice(0,10);
  quizState.data=picked.map(v=>{
    const wrong=shuffle(allPrepVerbs.filter(x=>x.m!==v.m)).slice(0,3);
    const opts=shuffle([v.m,...wrong.map(x=>x.m)]);
    return{q:v.p,sub:'이 표현의 뜻은?',opts,ans:opts.indexOf(v.m),hint:`${v.p} = ${v.m}`};
  });
  quizState.current=0;quizState.score=0;quizState.answered=[];quizState.mode='normal';renderQuiz();
}

function startVsQuiz(){
  const picked=shuffle(comparePairs).slice(0,10);
  quizState.data=picked.map(p=>{
    const wrong=shuffle(comparePairs.filter(x=>x.vt!==p.vt)).slice(0,3);
    const opts=shuffle([p.vt,...wrong.map(x=>x.vt)]);
    return{q:p.vi,sub:`"${p.vim}" — 같은 뜻의 타동사는?`,opts,ans:opts.indexOf(p.vt),hint:`자동사 ${p.vi} = 타동사 ${p.vt}`};
  });
  quizState.current=0;quizState.score=0;quizState.answered=[];quizState.mode='normal';renderQuiz();
}

function renderQuiz(){
  const{current,data}=quizState;
  if(current>=data.length){renderQuizResult();return}
  const q=data[current];
  let pips='';for(let i=0;i<data.length;i++){let c='quiz-pip';if(i<current)c+=quizState.answered[i]?' done':' wrong-pip';else if(i===current)c+=' current';pips+=`<div class="${c}"></div>`}
  document.getElementById('quiz-area').innerHTML=`
    <div class="quiz-progress">${pips}</div>
    <div class="quiz-card"><div class="quiz-label">Question ${current+1} of ${data.length}</div>
      <div class="quiz-sentence" style="font-size:1.15rem;font-weight:700">${q.q}</div>
      <div style="font-size:.85rem;color:var(--muted);margin:-14px 0 18px">${q.sub}</div>
      <div class="quiz-options">${q.opts.map((o,i)=>`<div class="quiz-opt" onclick="answerQuiz(${i})"><span class="opt-circle">${String.fromCharCode(65+i)}</span><span>${o}</span></div>`).join('')}</div>
      <div id="quiz-fb"></div></div>`;
}

function answerQuiz(idx){
  const q=quizState.data[quizState.current];
  const opts=document.querySelectorAll('.quiz-opt');
  if([...opts].some(o=>o.classList.contains('correct')))return;
  opts.forEach(o=>o.style.pointerEvents='none');
  const correct=idx===q.ans;
  if(correct){
    quizState.score++;quizState.answered.push(true);
    if(quizState.mode==='wrong-review'){
      const qKey=JSON.stringify({q:q.q,sub:q.sub});
      wrongBank=wrongBank.filter(w=>JSON.stringify({q:w.q,sub:w.sub})!==qKey);
      saveState();
    }
  }else{
    quizState.answered.push(false);
    if(quizState.mode!=='wrong-review'){
      const qKey=JSON.stringify({q:q.q,sub:q.sub});
      const exists=wrongBank.some(w=>JSON.stringify({q:w.q,sub:w.sub})===qKey);
      if(!exists){wrongBank.push({...q});saveState();}
    }
  }
  opts[idx].classList.add(correct?'correct':'wrong');
  if(!correct)opts[q.ans].classList.add('correct');
  document.getElementById('quiz-fb').innerHTML=`
    <div class="quiz-feedback ${correct?'correct-fb':'wrong-fb'}">${correct?'✓ 정답!':'✗ 아쉬워요!'} ${q.hint}</div>
    <button class="quiz-next" onclick="quizState.current++;renderQuiz()">${quizState.current<quizState.data.length-1?'다음 문제 →':'결과 보기'}</button>`;
  if(correct)spawnPetals();
  const pips=document.querySelectorAll('.quiz-pip');
  pips[quizState.current].classList.remove('current');
  pips[quizState.current].classList.add(correct?'done':'wrong-pip');
}

function startWrongQuiz(){
  if(wrongBank.length===0){
    document.getElementById('quiz-area').innerHTML=`
      <div style="text-align:center;padding:60px 20px">
        <div style="font-size:3rem;margin-bottom:16px;opacity:.4">🎉</div>
        <div style="font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;margin-bottom:8px">틀린 문제가 없어요!</div>
        <div style="font-size:.88rem;color:var(--muted);line-height:1.6">다른 퀴즈를 풀고 틀린 문제가 생기면<br>이곳에서 복습할 수 있어요.</div>
        <button class="result-btn" style="margin-top:24px" onclick="showQuizMenu()">← 돌아가기</button>
      </div>`;
    return;
  }
  // Shuffle the wrong bank and use all questions
  quizState.data=shuffle([...wrongBank]);
  quizState.current=0;quizState.score=0;quizState.answered=[];
  quizState.mode='wrong-review';
  renderQuiz();
}

function renderQuizResult(){
  const{score,data}=quizState;const total=data.length;const pct=Math.round(score/total*100);
  let msg,sub;
  if(quizState.mode==='wrong-review'){
    if(pct===100){msg='완벽해요! 🎉';sub='틀렸던 문제를 모두 맞혔어요!'}
    else if(pct>=70){msg='잘했어요! ✨';sub=`${score}개를 맞혀서 모음집에서 제거했어요.<br>나머지 ${wrongBank.length}개가 남아있어요.`}
    else{msg='다시 도전! 💪';sub=`${score}개를 맞혀서 모음집에서 제거했어요.<br>나머지 ${wrongBank.length}개를 더 복습해봐요.`}
  } else {
    if(pct>=90){msg='완벽해요! 🎉';sub='자동사 마스터 인정!'}
    else if(pct>=70){msg='잘했어요! ✨';sub='조금만 더 하면 완벽!'}
    else if(pct>=50){msg='괜찮아요! 💪';sub='틀린 표현을 저장해서 복습해보세요'}
    else{msg='화이팅! 🌱';sub='카테고리별로 다시 학습해봐요'}
  }
  document.getElementById('quiz-area').innerHTML=`
    <div class="quiz-result-screen">
      <div class="result-circle"><div class="score">${score}</div><div class="of">/ ${total}</div></div>
      <div class="result-msg">${msg}</div><div class="result-sub">${sub}</div>
      ${wrongBank.length>0?`<button class="result-btn" onclick="startWrongQuiz()">📕 틀린문제 다시 풀기 (${wrongBank.length})</button><br>`:''}
      <button class="result-btn ${wrongBank.length>0?'secondary':''}" style="margin-top:10px" onclick="showQuizMenu()">다른 퀴즈 풀기</button><br>
      <button class="result-btn secondary" style="margin-top:10px" onclick="goHome()">홈으로</button>
    </div>`;
  if(pct>=70)spawnPetals();
}

function spawnPetals(){
  const colors=['#e8a0b4','#c3b1e1','#f5c6d0','#f5cba7','#b8d4c8'];
  for(let i=0;i<12;i++){const p=document.createElement('div');p.className='petal';p.style.cssText=`left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};--dur:${2+Math.random()*2}s;animation-delay:${Math.random()*.5}s;width:${6+Math.random()*7}px;height:${6+Math.random()*7}px;opacity:${.5+Math.random()*.3}`;document.body.appendChild(p);setTimeout(()=>p.remove(),4500)}
}

loadState();
renderHome();

// Register Service Worker for PWA
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}
</script>
